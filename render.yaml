# Render Blueprint — backend API + managed PostgreSQL.
# Frontend is deployed separately on Vercel (see vercel.json).
services:
  - type: web
    name: b2b-portal-server
    runtime: node
    plan: free
    # Install all workspaces from the repo root, generate the Prisma client,
    # and compile the server.
    buildCommand: npm ci && npm run db:generate --workspace @b2b-portal/server && npm run build --workspace @b2b-portal/server
    # Apply migrations, then start. (start runs dist/server.js from server/.)
    startCommand: npm run db:migrate:deploy --workspace @b2b-portal/server && npm run start --workspace @b2b-portal/server
    healthCheckPath: /api/health/live
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: b2b-portal-db
          property: connectionString
      # JWT secrets — random, any value works.
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_MFA_SECRET
        generateValue: true
      # 64-hex (32 bytes) — set manually in the dashboard:
      #   node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
      - key: MFA_ENCRYPTION_KEY
        sync: false
      # Webhook secrets — must be real in production (set manually):
      - key: DIGIO_WEBHOOK_SECRET
        sync: false
      - key: PAYMENT_WEBHOOK_SECRET
        sync: false
      # Allowed browser origin(s) for CORS — set to your Vercel URL.
      - key: CORS_ORIGIN
        sync: false
      # Public base URL used in eSign/activation emails — set to your Vercel URL.
      - key: APP_BASE_URL
        sync: false
      # Providers default to mock/local/console — set real ones when available.
      # Persistent document storage: Render's disk is ephemeral, so set
      # STORAGE_PROVIDER=s3 with an S3-compatible bucket (Cloudflare R2,
      # Supabase Storage, Backblaze B2, …) and its S3_* vars for production.

databases:
  - name: b2b-portal-db
    plan: free
    databaseName: b2b_booking_portal
